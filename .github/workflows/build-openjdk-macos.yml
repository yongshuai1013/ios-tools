name: Build OpenJDK Mobile for macOS

on:
  workflow_call:
    inputs:
      mobile_repo:
        description: 'URL of the OpenJDK Mobile repository to clone'
        type: string
        default: 'https://github.com/openjdk/mobile.git'
      mobile_ref:
        description: 'Branch, tag or commit hash of the OpenJDK Mobile repository to checkout'
        type: string
        default: 'master'

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 'Install toolchain and dependencies'
        run: |
          # Run Homebrew installation and xcode-select
          brew install autoconf make
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          # This will make GNU make available as 'make' and not only as 'gmake' 
          echo '/usr/local/opt/make/libexec/gnubin' >> $GITHUB_PATH

      - name: Checkout builder repo
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Patch and build OpenJDK Mobile sources
        env:
          MOBILE_REPO: ${{ inputs.mobile_repo }}
          MOBILE_REF: ${{ inputs.mobile_ref }}
        run: |
          git clone -- "$MOBILE_REPO" mobile
          cd mobile
          git checkout "$MOBILE_REF"
          
          bash configure \
            --with-conf-name=macos-aarch64 \
            --with-boot-jdk=$JAVA_HOME \
            --disable-warnings-as-errors
          make LOG=cmdlines,info CONF=macos-aarch64 jdk-image

      - name: Upload macOS JDK
        uses: actions/upload-artifact@v7
        with:
          name: macos-jdk
          path: |
            mobile/build/macos-aarch64/images/jdk
