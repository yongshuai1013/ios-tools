name: Build OpenJDK Mobile

on:
  workflow_call:
    inputs:
      mobile_repo:
        description: 'URL of the OpenJDK Mobile repository to clone'
        type: string
        default: 'https://github.com/openjdk/mobile.git'
      mobile_ref:
        description: 'Branch, tag or commit hash of the OpenJDK Mobile repository to checkout'
        type: string
        default: 'master'

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 'Install toolchain and dependencies'
        run: |
          # Run Homebrew installation and xcode-select
          brew install libffi
          brew install autoconf make
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          # This will make GNU make available as 'make' and not only as 'gmake' 
          echo '/usr/local/opt/make/libexec/gnubin' >> $GITHUB_PATH

      - name: Checkout builder repo
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download and unzip mobile-support
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download libffi-build --pattern "libffi-ios.zip"
          mkdir -p ../support
          unzip libffi-ios.zip -d ../support
          echo "unzip done"
          echo "$(realpath ../support)"

      - name: Clone OpenJDK Mobile sources
        env:
          MOBILE_REPO: ${{ inputs.mobile_repo }}
          MOBILE_REF: ${{ inputs.mobile_ref }}
        run: |
          git clone -- "$MOBILE_REPO" mobile
          cd mobile
          git checkout "$MOBILE_REF"
          cp ../openjdk-ext/src/hotspot/symbol_keeper.cpp src/hotspot/os/bsd
          
          bash configure \
          --with-conf-name=ios-aarch64-zero-release \
          --disable-warnings-as-errors \
          --openjdk-target=aarch64-macos-ios \
          --with-sysroot=/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk \
          --with-libffi-include=$(realpath ../../support/include/ffi) \
          --with-libffi-lib=$(realpath ../../support) \
          --with-cups-include=$(xcrun --sdk macosx --show-sdk-path)/usr/include
          make LOG=cmdlines,info CONF=ios-aarch64-zero-release static-libs-image

      - name: List current directory
        run: |
          echo "Current directory: $(pwd)"
          ls -la

      - name: List mobile directory
        run: |
          if [ -d "mobile" ]; then
            echo "'mobile' directory exists, listing contents:"
            ls -la mobile
          else
            echo "'mobile' directory does not exist!"
          fi

      - name: Upload device artifact
        uses: actions/upload-artifact@v7
        with:
          name: libjvm-device
          path: |
            mobile/build/ios-aarch64-zero-release/images/static-libs/lib/zero/libjvm.a
            mobile/build/ios-aarch64-zero-release/images/static-libs/lib/libjava.a
            mobile/build/ios-aarch64-zero-release/images/static-libs/lib/libjimage.a
            mobile/build/ios-aarch64-zero-release/images/static-libs/lib/libnet.a
            mobile/build/ios-aarch64-zero-release/images/static-libs/lib/libnio.a
            mobile/build/ios-aarch64-zero-release/images/static-libs/lib/libzip.a
            mobile/build/ios-aarch64-zero-release/jdk/include

      - name: Upload java.base
        uses: actions/upload-artifact@v7
        with:
          name: java.base-device
          path: |
            mobile/build/ios-aarch64-zero-release/jdk/modules/java.base
